<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog Preview Card</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.blog-card:hover {
  transform: translateY(-5px);
  transition: 0.3s;
}
</style>

</head>

<body class="bg-warning">

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

  <div class="row justify-content-center">

    <div class="col-12 col-md-6 col-lg-4">

      <div class="card shadow rounded-4 blog-card">

        <img src="assets/images/illustration-article.svg" class="card-img-top rounded-top-4" alt="Blog image">

        <div class="card-body">

          <span class="badge bg-warning text-dark mb-2">Learning</span>

          <p class="text-muted small mb-2">Published 21 Dec 2023</p>

          <h5 class="fw-bold">HTML & CSS foundations</h5>

          <p class="text-muted">
            These languages are the backbone of every website, defining structure,
            content, and presentation.
          </p>

          <div class="d-flex align-items-center mt-3">

            <img src="assets/images/image-avatar.webp" width="32" class="rounded-circle me-2" alt="avatar">

            <span class="fw-semibold">Greg Hooper</span>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

</body>

</html>
